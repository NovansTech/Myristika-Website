<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Tree Symbol -->
  <g id="tree-icon">
    <!-- Leaves -->
    <ellipse cx="150" cy="90" rx="25" ry="35" fill="#4A7C59" transform="rotate(-30 150 90)"/>
    <ellipse cx="200" cy="70" rx="25" ry="35" fill="#4A7C59"/>
    <ellipse cx="250" cy="90" rx="25" ry="35" fill="#4A7C59" transform="rotate(30 250 90)"/>
    <ellipse cx="130" cy="130" rx="25" ry="35" fill="#5A8B6B" transform="rotate(-60 130 130)"/>
    <ellipse cx="270" cy="130" rx="25" ry="35" fill="#5A8B6B" transform="rotate(60 270 130)"/>
    <ellipse cx="160" cy="140" rx="20" ry="30" fill="#5A8B6B" transform="rotate(-15 160 140)"/>
    <ellipse cx="240" cy="140" rx="20" ry="30" fill="#5A8B6B" transform="rotate(15 240 140)"/>
    
    <!-- Trunk -->
    <rect x="190" y="160" width="20" height="80" fill="#4A7C59" rx="10"/>
    
    <!-- Roots -->
    <path d="M180 240 Q150 250 130 265 Q120 270 125 275" stroke="#4A7C59" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M220 240 Q250 250 270 265 Q280 270 275 275" stroke="#4A7C59" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M200 240 Q200 260 200 280" stroke="#4A7C59" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M190 250 Q170 270 155 285" stroke="#4A7C59" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M210 250 Q230 270 245 285" stroke="#4A7C59" stroke-width="6" fill="none" stroke-linecap="round"/>
    
    <!-- Root tips -->
    <circle cx="125" cy="275" r="4" fill="#4A7C59"/>
    <circle cx="275" cy="275" r="4" fill="#4A7C59"/>
    <circle cx="155" cy="285" r="3" fill="#4A7C59"/>
    <circle cx="245" cy="285" r="3" fill="#4A7C59"/>
    <circle cx="200" cy="280" r="3" fill="#4A7C59"/>
  </g>
  
  <!-- Company Name -->
  <g id="company-name">
    <text x="200" y="340" text-anchor="middle" fill="#4A7C59" font-family="Arial, sans-serif" font-size="32" font-weight="bold">MYRISTIKA</text>
    <text x="200" y="370" text-anchor="middle" fill="#5A8B6B" font-family="Arial, sans-serif" font-size="20" font-weight="600">SUSTAINABLE</text>
    <text x="200" y="390" text-anchor="middle" fill="#5A8B6B" font-family="Arial, sans-serif" font-size="20" font-weight="600">SOLUTIONS</text>
  </g>
</svg>